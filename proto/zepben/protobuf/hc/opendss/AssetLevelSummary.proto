syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.zepben.protobuf.hc.opendss";
package zepben.protobuf.hc.opendss;

/**
 * Message for streaming per-phase asset-level voltage summary reports.
 */
message AssetLevelVoltageSummaryReport {
    string elementId = 1;
    string conductingEquipmentMrid = 2;
    int32 phase = 3;
    int32 sampleCount = 4;
    double intervalHoursSum = 5;
    double minFromVoltagePu = 6;
    double maxFromVoltagePu = 7;
    double avgFromVoltagePu = 8;
    double minToVoltagePu = 9;
    double maxToVoltagePu = 10;
    double avgToVoltagePu = 11;
    double minDeltaPu = 12;
    int32 minDeltaIntervalIndex = 13;
    double maxDeltaPu = 14;
    int32 maxDeltaIntervalIndex = 15;
    double minAbsDeltaPu = 16;
    int32 minAbsDeltaIntervalIndex = 17;
    double maxAbsDeltaPu = 18;
    int32 maxAbsDeltaIntervalIndex = 19;
    double absDeltaPuHours = 20;
    double avgAbsDeltaPu = 21;
    double hoursAnyEndpointBelowLimit = 22;
    double hoursAnyEndpointAboveLimit = 23;
}

/**
 * Unit used for asset-level thermal loading ratings.
 */
enum ThermalLoadingRatingUnit {
    THERMAL_LOADING_RATING_UNIT_UNSPECIFIED = 0;
    THERMAL_LOADING_RATING_UNIT_A = 1;
    THERMAL_LOADING_RATING_UNIT_KVA = 2;
}

/**
 * Direction of active power flow at the point of maximum loading.
 */
enum ThermalLoadingPowerDirection {
    THERMAL_LOADING_POWER_DIRECTION_UNSPECIFIED = 0;
    THERMAL_LOADING_POWER_DIRECTION_IMPORT = 1;
    THERMAL_LOADING_POWER_DIRECTION_EXPORT = 2;
}

/**
 * Message for streaming asset-level thermal loading summary reports.
 */
message AssetLevelThermalLoadingSummaryReport {
    string conductingEquipmentMrid = 1;
    string dssElementIds = 2;
    int32 sampleCount = 3;
    double intervalHoursSum = 4;
    ThermalLoadingRatingUnit ratingUnit = 5;
    double normalRating = 6;
    double emergencyRating = 7;
    double maxLoadingPct = 8;
    optional int32 maxLoadingIntervalIndex = 9;
    ThermalLoadingPowerDirection directionAtMaxLoading = 10;
    optional double maxCurrentA = 11;
    optional double maxKva = 12;
    double maxKw = 13;
    double maxKvar = 14;
    double maxExcessPct = 15;
    double hoursOverNormal = 16;
    double hoursOverEmergency = 17;
    double overloadKwhImport = 18;
    double overloadKwhExport = 19;
    double overloadPctHours = 20;
    double avgLoadingPctWhenOverloaded = 21;
    optional int32 worstPhase = 22;
}
