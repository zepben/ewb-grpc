syntax = "proto3";
option java_multiple_files = true;
option java_package = "com.zepben.protobuf.cim.iec61970.base.core";
package zepben.protobuf.cim.iec61970.base.core;

/**
 * Busbar layout for a bay.
 */
enum BusbarConfiguration {

    /**
     * Single bus.
     */
    SINGLE_BUS = 0;

    /**
     * Double bus.
     */
    DOUBLE_BUS = 1;

    /**
     * Main bus with transfer bus.
     */
    MAIN_WITH_TRANSFER_BUS = 2;

    /**
     * Ring bus.
     */
    RING_BUS = 3;

}
