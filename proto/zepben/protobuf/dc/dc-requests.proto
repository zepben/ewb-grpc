syntax = "proto3";
option java_multiple_files = true;
option java_package = "com.zepben.protobuf.dc";
package zepben.protobuf.dc;

import "google/protobuf/timestamp.proto";
import "zepben/protobuf/vc/vc-data.proto";

/**
 * A request to get identified objects.
 */
message GetIdentifiedObjectsRequest {

    /**
     * An identifier for this message. Currently unused.
     */
    int64 messageId = 1;

    /**
     * The list of mRIDs to retrieve.
     */
    repeated string mrids = 2;

}

/**
 * A request to get diagram objects for other identified objects.
 */
message GetDiagramObjectsRequest {

    /**
     * An identifier for this message. Currently unused.
     */
    int64 messageId = 1;

    /**
     * The list of mRIDs to retrieve diagrams objects for.
     */
    repeated string mrids = 2;

}

/**
 * A request to get change set objects.
 */
message GetChangeSetObjectsRequest {

    /**
     * An identifier for this message. Currently unused.
     */
    int64 messageId = 1;

    /**
     * The list of mRIDs to retrieve.
     */
    string changeSetMRID = 2;

    /*
     * The content types of the variant to retrieve.
     */
    vc.VariantContents variantContents = 3;

    /**
     * The base model version to check for the variant.
     * Defaults to the current version if unset.
     */
    google.protobuf.Timestamp modelVersion = 4;

}
