name: NetworkModelProjectStage
description: A specific phase in a network model project.
attributes:
  - name: plannedCommissionedDate
    type: DateTime
    description: The date expected for this stage to be commissioned.
  - name: commissionedDate
    type: DateTime
    description: The date this stage was commissioned.
  - name: confidenceLevel
    type: Integer
    description: \[ZBEX\] The percentage confidence that this project will be committed to.
  - name: lastConflictCheckedAt
    type: DateTime
    description: \[ZBEX\] The time the last conflict check occurred.
  - name: userComments
    type: String
    description: \[ZBEX\] User comments
ancestors:
  - NetworkModelProjectComponent
associations:
  - source: NetworkModelProjectStage
    target: NetworkModelProjectStageVersion
    sourceCardinality: 0..1
    sourceName: Stage
    sourceDescription: The project stage for this version.
    targetCardinality: 0..*
    targetName: Versions
    targetDescription: The versions of this project stage.
  - source: NetworkModelProjectStage
    target: AnnotatedProjectDependency
    sourceCardinality: 0..1
    sourceName: DependentOnStage
    sourceDescription: The stages that are being depended upon by this stage.
    targetCardinality: 0..*
    targetName: DependingStage
    targetDescription: /[ZBEX/] The stage that relies on another stage. This is a direct replacement of DependencyDependentOnStage due to its confusing name.
  - source: NetworkModelProjectStage
    target: AnnotatedProjectDependency
    sourceCardinality: 0..1
    sourceName: DependingStage
    sourceDescription: The stages that rely on this stage.
    targetCardinality: 0..*
    targetName: DependentOnStage
    targetDescription: /[ZBEX/] The stage that is being depended upon by another stage. This is a direct replacement of DependencyDependingStage due to its confusing name.
  - source: NetworkModelProjectStage
    target: EquipmentContainer
    targetName: EquipmentContainers
    targetCardinality: 0..*
    targetDescription: \[ZBEX\] The equipment containers this stage is related to.
