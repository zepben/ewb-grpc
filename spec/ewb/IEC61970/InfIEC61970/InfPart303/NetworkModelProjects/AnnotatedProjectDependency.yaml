name: AnnotatedProjectDependency
description: Represents the dependency relationship between two network model project stages.
attributes:
  - name: dependencyType
    type: DependencyKind
    description: Describes the dependency relationship between the two classes.
ancestors:
  - IdentifiedObject
associations:
  - source: AnnotatedProjectDependency
    target: NetworkModelProjectStage
    sourceCardinality: 0..*
    sourceName: Depending
    sourceDescription: /[ZBEX/] The dependencies relying upon this stage. This is a direct replacement of DependencyDependentOnStage due to its confusing name.
    targetCardinality: 0..1
    targetName: DependentOnStage
    targetDescription: The stage this dependency relies upon.
  - source: AnnotatedProjectDependency
    target: NetworkModelProjectStage
    sourceCardinality: 0..*
    sourceName: DependentOn
    sourceDescription: /[ZBEX/] The dependencies that this stage relies upon. This is a direct replacement of DependencyDependingStage due to its confusing name.
    targetCardinality: 0..1
    targetName: DependingStage
    targetDescription: The stage relying upon this dependency.
