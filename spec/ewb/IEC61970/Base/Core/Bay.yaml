name: Bay
description: |
  A collection of power system resources (within a given substation) including
  conducting equipment, protection relays, measurements, and telemetry.
  A bay typically represents a physical grouping related to modularization
  of equipment.
attributes:
- name: bayEnergyMeasFlag
  type: Boolean
  nullable: true
  description: Indicates the presence/absence of energy measurements.
- name: bayPowerMeasFlag
  type: Boolean
  nullable: true
  description: Indicates the presence/absence of active/reactive power measurements.
- name: breakerConfiguration
  type: BreakerConfiguration
  description: Switching arrangement for the bay.
- name: busbarConfiguration
  type: BusbarConfiguration
  description: Busbar layout for the bay.
ancestors:
- EquipmentContainer
associations:
- source: Bay
  target: Substation
  sourceCardinality: 0..*
  sourceName: Bay
  sourceDescription: The substation containing the bay.
  targetCardinality: 0..1
  targetName: Substation
  targetDescription: Substation containing the bay.
- source: Bay
  target: VoltageLevel
  sourceCardinality: 0..*
  sourceName: Bay
  sourceDescription: The voltage level containing this bay.
  targetCardinality: 0..1
  targetName: VoltageLevel
  targetDescription: The voltage level containing this bay.
- source: Bay
  target: Circuit
  sourceCardinality: 0..*
  sourceName: EndBay
  sourceDescription: The circuit (end bay) associated with this bay.
  targetCardinality: 0..1
  targetName: Circuit
  targetDescription: The circuit at the end of this bay.
