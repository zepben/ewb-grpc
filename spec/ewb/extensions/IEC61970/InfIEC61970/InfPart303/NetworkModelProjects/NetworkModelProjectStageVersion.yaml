name: NetworkModelProjectStageVersion
description: \[ZBEX\] A corrected copy of `NetworkModelProjectChangeVersion` for use with `NetworkModelProjectStage` instead of `NetworkModelProjectChange`.
  Describes the status and the planned implementation of the associated change set into the as-built model.    New
  instances of this class with new identity are instantiated upon changes to the content of this class or changes to the associated
  change set.  Instances of this class are considered immutable.  The case audit trail can reference this immutable data to
  exactly reproduce a case.
attributes:
  - name: timeStamp
    type: DateTime
    description: The date/time this version was finalized and thus made immutable.
ancestors:
  - IdentifiedObject
